services:
  db:
    image: mysql:8.0
    container_name: event-bridge-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: event_bridge_db
    # ports:
    #   - "3308:3306" # Uncomment if you need to access the database from your host (e.g., via MySQL Workbench)
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: event-bridge-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/event_bridge_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=root_password
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: event-bridge-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
